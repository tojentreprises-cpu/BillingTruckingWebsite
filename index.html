<script>
/* Timeline safety net: if rAF never ticks, force scroll-reveal content visible. */
(function(){
  var ticked = false;
  try{ requestAnimationFrame(function(){ ticked = true; }); }catch(e){ ticked = false; }
  setTimeout(function(){ if(!ticked && document.body){ document.body.classList.add('no-anim'); } }, 400);
})();
</script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
/* Reliable sequential JSX loader */
(function(){
  var FILES = ['js/utils.jsx','js/heroes.jsx','js/sections.jsx','js/contact.jsx','js/horizontal.jsx','js/app-horizontal.jsx'];
  async function fetchText(url, tries){
    tries = tries||3;
    for(var i=0;i<tries;i++){
      try{ var r = await fetch(url, {cache:'no-cache'}); if(r.ok) return await r.text(); }
      catch(e){}
      await new Promise(function(res){ setTimeout(res, 250*(i+1)); });
    }
    throw new Error('Failed to load '+url);
  }
  async function boot(){
    if(!window.Babel){ setTimeout(boot, 50); return; }
    try{
      for(var i=0;i<FILES.length;i++){
        var src = await fetchText(FILES[i]);
        var code = Babel.transform(src, {presets:['react'], filename:FILES[i]}).code;
        var s = document.createElement('script');
        s.textContent = '//# sourceURL='+FILES[i]+'\n'+code;
        document.body.appendChild(s);
      }
    }catch(err){
      console.error(err);
      document.getElementById('root').innerHTML = '<div style="padding:40px;font-family:monospace;color:#900">Load error: '+err.message+'</div>';
    }
  }
  boot();
})();
</script>
